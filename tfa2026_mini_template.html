<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Federalytics · TFA 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── VARIABLES ─────────────────────────────── */
:root {
  --bg:  #0d0d0d;
  --s1:  #161616;
  --s2:  #1c1c1c;
  --s3:  #272727;
  --t1:  #f0f0f0;
  --t2:  #cccccc;
  --t3:  #888888;
  --tn:  #555555;

  --z1:  #29b6f6;
  --z2:  #66bb6a;
  --z3:  #ff7043;
  --z4:  #f06292;

  --rv:  #00e676;
  --re:  #ffe600;
  --rp:  #ff3333;
  --gp:  #00e676;
  --gn:  #ff4444;
  --acc: #0066cc;

  --grotesk: 'Space Grotesk', sans-serif;
  --mono:    'DM Mono', monospace;
}

/* ── RESET ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--t1);
  font-family: var(--grotesk);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ────────────────────────────────── */
.hdr {
  background: var(--s1);
  border-bottom: 1px solid var(--s3);
  padding: 14px 16px 0;
}
.hdr-top {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 12px;
}
.hdr-title {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: .1em;
  color: var(--t1);
}
.hdr-meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--t3);
  letter-spacing: .04em;
}

/* ── TABS NAV ──────────────────────────────── */
.tab-nav {
  display: flex;
  background: var(--s1);
  border-bottom: 1px solid var(--s3);
  padding: 0 16px;
}
.tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--t3);
  font-family: var(--grotesk);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .1em;
  padding: 10px 14px;
  cursor: pointer;
  transition: color .12s, border-color .12s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--t2); }
.tab-btn.active { color: var(--t1); border-bottom-color: var(--acc); }

/* ── TAB CONTENT ───────────────────────────── */
.tab-pane { display: none; padding: 16px; }
.tab-pane.active { display: block; }

/* ── ZONES GRID ────────────────────────────── */
.zones-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
@media (max-width: 720px) { .zones-grid { grid-template-columns: 1fr; } }

/* ── ZONE CARD ─────────────────────────────── */
.zcard {
  background: var(--s1);
  border: 1px solid var(--s3);
  border-radius: 3px;
  overflow: hidden;
}
.zhdr {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--s3);
}
.zdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.zname { font-size: 12px; font-weight: 600; letter-spacing: .06em; }
.zmeta { font-size: 10px; color: var(--t3); margin-left: auto; }

/* ── TABLE ─────────────────────────────────── */
.tscroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 5px 4px;
  text-align: right;
  color: var(--t3);
  font-family: var(--grotesk);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: .06em;
  border-bottom: 1px solid var(--s3);
  white-space: nowrap;
}
thead th.th-l { text-align: left; padding-left: 8px; }
thead th.th-c { text-align: center; }
tbody td {
  padding: 4px 4px;
  text-align: right;
  border-bottom: 1px solid var(--s3);
  color: var(--t2);
  font-family: var(--mono);
  font-size: 12px;
  white-space: nowrap;
}
tbody td.td-l { text-align: left; color: var(--t1); font-family: var(--grotesk); padding-left: 8px; }
tbody td.td-c { text-align: center; }
tbody td.td-n { color: var(--tn); text-align: right; font-family: var(--grotesk); font-size: 11px; width: 20px; }
tbody td.td-pts { color: var(--t1); font-weight: 500; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--s2); cursor: pointer; }
tbody tr.tsep td { border-top: 1px solid var(--s3); }

/* column widths */
.col-n    { width: 20px; }
.col-eq   { min-width: 120px; }
.col-pts  { width: 30px; }
.col-pj   { width: 22px; }
.col-gep  { width: 22px; }
.col-gol  { width: 54px; }
.col-dg   { width: 32px; }
.col-racha{ width: 84px; min-width: 70px; }

/* ── DG COLORS ─────────────────────────────── */
.dg-pos { color: var(--gp); }
.dg-neg { color: var(--gn); }
.dg-zer { color: var(--tn); }

/* ── RACHA CIRCLES ─────────────────────────── */
.racha {
  display: flex;
  flex-direction: row;
  flex-wrap: nowrap;
  gap: 3px;
  justify-content: center;
  align-items: center;
  padding: 0 4px;
  min-width: 62px;
}
.rch {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.rch-G { background: var(--rv); }
.rch-E { background: var(--re); }
.rch-P { background: var(--rp); }
.rch-x { background: var(--s3); opacity: .4; }

/* ── FILTER BUTTONS ────────────────────────── */
.tbtn {
  font-family: var(--grotesk);
  font-size: 10px;
  padding: 3px 10px;
  border: 1px solid var(--s3);
  border-radius: 2px;
  background: transparent;
  color: var(--t3);
  cursor: pointer;
  letter-spacing: .06em;
}
.tbtn:hover { color: var(--t2); border-color: var(--t2); }
.tbtn.active { background: var(--t1); color: var(--bg); border-color: var(--t1); font-weight: 500; }
.tbtn.disabled { opacity: .35; pointer-events: none; cursor: default; }

/* ── PANEL OVERLAY ─────────────────────────── */
.panel-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 100;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}
.panel-bg.open { display: block; }

/* ── TEAM PANEL — desktop ──────────────────── */
.team-panel {
  position: fixed;
  z-index: 101;
  background: var(--s1);
  border: 1px solid var(--s3);
  border-radius: 4px;
  overflow: hidden;
  top: 50%;
  left: 50%;
  width: min(520px, 92vw);
  max-height: 86vh;
  transform: translate(-50%, -50%) scale(.97);
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s, transform .15s;
}
.team-panel.open {
  opacity: 1;
  pointer-events: auto;
  transform: translate(-50%, -50%) scale(1);
}

/* ── TEAM PANEL — mobile bottom sheet ─────── */
@media (max-width: 600px) {
  .team-panel {
    top: auto;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    max-height: 88vh;
    border-radius: 12px 12px 0 0;
    border-bottom: none;
    transform: translateY(100%);
    opacity: 1;
    transition: transform .22s cubic-bezier(.4,0,.2,1);
  }
  .team-panel.open { transform: translateY(0); }
}

.panel-drag {
  display: none;
  width: 36px; height: 4px;
  background: var(--s3);
  border-radius: 2px;
  margin: 10px auto 4px;
}
@media (max-width: 600px) { .panel-drag { display: block; } }

.panel-hdr {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--s3);
}
.panel-team-name {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: .02em;
  color: var(--t1);
}
.panel-badge {
  font-size: 10px;
  color: var(--t3);
  font-family: var(--mono);
}
.panel-close {
  margin-left: auto;
  background: none;
  border: none;
  color: var(--t3);
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  padding: 2px 4px;
}
.panel-close:hover { color: var(--t1); }

.panel-body {
  overflow-y: auto;
  max-height: calc(86vh - 58px);
  padding: 12px 16px 24px;
  -webkit-overflow-scrolling: touch;
}
@media (max-width: 600px) { .panel-body { max-height: calc(88vh - 68px); } }

.panel-sec {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .14em;
  color: var(--t3);
  text-transform: uppercase;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--s3);
  margin-bottom: 8px;
  margin-top: 16px;
}
.panel-sec:first-child { margin-top: 0; }

/* partidos en panel */
.part-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 0;
  border-bottom: 1px solid var(--s3);
  font-size: 11px;
}
.part-row:last-child { border-bottom: none; }
.part-f    { font-family: var(--mono); color: var(--t3); font-size: 10px; width: 22px; flex-shrink: 0; }
.part-cond { font-size: 9px; color: var(--t3); letter-spacing: .04em; width: 32px; flex-shrink: 0; }
.part-sc   { font-family: var(--mono); font-size: 12px; color: var(--t1); font-weight: 500; flex-shrink: 0; width: 36px; }
.part-rv   { color: var(--t2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.part-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* goleadores en panel */
.gol-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  border-bottom: 1px solid var(--s3);
  font-size: 11px;
}
.gol-row:last-child { border-bottom: none; }
.gol-n    { font-family: var(--mono); font-weight: 500; color: var(--t1); width: 18px; text-align: right; flex-shrink: 0; }
.gol-name { color: var(--t2); flex: 1; }
.gol-pen  { font-size: 9px; color: var(--t3); }

/* ── RESPONSIVE ────────────────────────────── */
@media (max-width: 600px) {
  .tab-pane  { padding: 12px 8px; }
  .panel-hdr { padding: 10px 14px; }
  .panel-body{ padding: 10px 14px 20px; }
  .hdr       { padding: 12px 12px 0; }
  .tab-nav   { padding: 0 12px; }

  /* tabla posiciones: todo visible sin scroll */
  tbody td, thead th { padding: 3px 2px; font-size: 10px; }
  .col-n   { width: 14px; }
  .col-eq  { min-width: 0; max-width: 80px; overflow: hidden;
             text-overflow: ellipsis; white-space: nowrap; }
  .col-pts { width: 24px; }
  .col-pj  { width: 20px; }
  .col-gep { width: 20px; }
  .col-gol { width: 38px; }
  .col-dg  { width: 28px; }
  .col-racha { width: 48px; }
  .rch  { width: 7px; height: 7px; }
  .racha { gap: 2px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-top">
    <span class="hdr-title">FEDERALYTICS</span>
    <span class="hdr-meta">TFA 2026 · F{{FECHA_ACTUAL}}/{{FECHA_TOTAL}}</span>
  </div>
</header>

<!-- TABS NAV -->
<nav class="tab-nav">
  <button class="tab-btn active" data-tab="pos">POSICIONES</button>
  <button class="tab-btn" data-tab="est">ESTADÍSTICAS</button>
</nav>

<!-- TAB: POSICIONES -->
<div id="tab-pos" class="tab-pane active">
  <div class="zones-grid">
    {{ZONAS_1F}}
  </div>
</div>

<!-- TAB: ESTADÍSTICAS -->
<div id="tab-est" class="tab-pane">
  {{STATS_FULL}}
</div>

<!-- PANEL OVERLAY -->
<div id="panel-bg" class="panel-bg"></div>

<!-- TEAM PANEL -->
<div id="team-panel" class="team-panel">
  <div class="panel-drag" id="panel-drag"></div>
  <div class="panel-hdr">
    <div class="panel-team-name" id="panel-name"></div>
    <div class="panel-badge" id="panel-badge"></div>
    <button class="panel-close" id="panel-close">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<!-- DATA INJECTION -->
<script>const PERFILES = {{PERFILES_JSON}};</script>

<script>
(function () {
  'use strict';

  // ── ZONE COLORS
  var ZC = { 1: '#29b6f6', 2: '#66bb6a', 3: '#ff7043', 4: '#f06292' };

  // ── HELPERS
  function racha(arr, n) {
    var html = '<div class="racha">';
    for (var j = 0; j < arr.length; j++) html += '<div class="rch rch-' + arr[j] + '"></div>';
    var pad = n - arr.length;
    for (var i = 0; i < pad; i++) html += '<div class="rch rch-x"></div>';
    html += '</div>';
    return html;
  }

  function dgHTML(dg) {
    if (dg > 0) return '<span class="dg-pos">+' + dg + '</span>';
    if (dg < 0) return '<span class="dg-neg">' + dg + '</span>';
    return '<span class="dg-zer">—</span>';
  }

  // ── TAB SWITCHING
  document.querySelectorAll('.tab-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var tab = this.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
      document.querySelectorAll('.tab-pane').forEach(function (p) { p.classList.remove('active'); });
      this.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    });
  });

  // ── POPULATE RACHA CIRCLES in POSICIONES table
  function populateRacha() {
    document.querySelectorAll('tr[data-equipo]').forEach(function (tr) {
      var nombre = tr.dataset.equipo;
      var p      = PERFILES[nombre];
      var td     = tr.querySelector('.col-racha');
      if (!td || !p) return;
      td.innerHTML = racha(p.racha || [], 5);
    });
  }
  requestAnimationFrame(populateRacha);

  // ── PANEL
  var panelBg    = document.getElementById('panel-bg');
  var teamPanel  = document.getElementById('team-panel');
  var panelName  = document.getElementById('panel-name');
  var panelBadge = document.getElementById('panel-badge');
  var panelBody  = document.getElementById('panel-body');
  var panelClose = document.getElementById('panel-close');

  function openPanel(nombre) {
    var p = PERFILES[nombre];
    if (!p) return;
    var zc = ZC[p.zona] || '#888';
    panelName.textContent  = nombre;
    panelBadge.textContent = 'Z' + p.zona + ' · #' + p.pos;
    panelBadge.style.color = zc;
    panelBody.innerHTML    = buildPanel(p);
    panelBg.classList.add('open');
    teamPanel.classList.add('open');
    document.body.style.overflow = 'hidden';
    panelBody.scrollTop = 0;
  }

  function closePanel() {
    panelBg.classList.remove('open');
    teamPanel.classList.remove('open');
    document.body.style.overflow = '';
  }

  panelBg.addEventListener('click', closePanel);
  panelClose.addEventListener('click', closePanel);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closePanel(); });

  document.addEventListener('click', function (e) {
    var tr = e.target.closest('tr[data-equipo]');
    if (tr) openPanel(tr.dataset.equipo);
  });

  // ── BUILD PANEL CONTENT
  function buildPanel(p) {
    var html = '';
    var BD   = 'border-bottom:1px solid var(--s3)';

    // helpers de td
    var th = function (v, a) {
      return '<th style="padding:4px 6px;text-align:' + (a || 'right') +
        ';color:var(--t3);font-family:var(--grotesk);font-size:9px;font-weight:400;letter-spacing:.06em;' + BD + '">' + v + '</th>';
    };
    var td = function (v) {
      return '<td style="padding:4px 6px;text-align:right;color:var(--t2);font-family:var(--mono);font-size:11px;' + BD + '">' + v + '</td>';
    };
    var tdDG = function (dg) {
      return '<td style="padding:4px 6px;text-align:right;font-family:var(--mono);font-size:11px;' + BD + '">' + dgHTML(dg) + '</td>';
    };

    // stats por condición calculadas desde partidos
    function condStats(cond) {
      var parts = (p.partidos || []).filter(function (x) { return x.cond === cond; });
      var pg  = parts.filter(function (x) { return x.res === 'G'; }).length;
      var pe  = parts.filter(function (x) { return x.res === 'E'; }).length;
      var pp  = parts.filter(function (x) { return x.res === 'P'; }).length;
      var gf  = parts.reduce(function (a, x) { return a + x.gf; }, 0);
      var gc  = parts.reduce(function (a, x) { return a + x.gc; }, 0);
      var pj  = parts.length;
      var pts = pg * 3 + pe;
      var dg  = gf - gc;
      var r5  = parts.slice(-5).map(function (x) { return x.res; });
      return { pj: pj, pts: pts, pg: pg, pe: pe, pp: pp, gf: gf, gc: gc, dg: dg, r5: r5 };
    }

    function condRow(label, s) {
      return '<tr>'
        + '<td style="padding:4px 8px;color:var(--t1);font-family:var(--grotesk);font-size:10px;font-weight:500;letter-spacing:.05em;' + BD + '">' + label + '</td>'
        + td(s.pts) + td(s.pj) + td(s.pg) + td(s.pe) + td(s.pp)
        + '<td style="padding:4px 6px;text-align:center;color:var(--t2);font-family:var(--mono);font-size:11px;' + BD + '">' + s.gf + ':' + s.gc + '</td>'
        + tdDG(s.dg)
        + '<td style="padding:4px 8px;' + BD + '">' + racha(s.r5, 5) + '</td>'
        + '</tr>';
    }

    var ls = condStats('LOCAL');
    var vs = condStats('VISIT');

    // ── LOCAL / VISITANTE
    html += '<div class="panel-sec">LOCAL / VISITANTE</div>';
    html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">';
    html += '<thead><tr>'
      + th('', 'left')
      + th('PTS') + th('PJ') + th('G') + th('E') + th('P')
      + th('GOL', 'center') + th('DG') + th('RACHA', 'center')
      + '</tr></thead><tbody>';
    html += condRow('LOCAL', ls);
    html += condRow('VISIT', vs);
    html += '</tbody></table></div>';

    // ── PARTIDOS JUGADOS (más reciente primero, con libres)
    html += '<div class="panel-sec">PARTIDOS JUGADOS</div>';

    // Fechas globales del torneo (de todos los equipos)
    var allFechas = [];
    Object.values(PERFILES).forEach(function (x) {
      (x.partidos || []).forEach(function (m) {
        if (allFechas.indexOf(m.f) < 0) allFechas.push(m.f);
      });
    });
    allFechas.sort(function (a, b) { return a - b; });

    // Mapa fecha → partido del equipo
    var jugadasMap = {};
    (p.partidos || []).forEach(function (m) { jugadasMap[m.f] = m; });

    // Lista completa más reciente primero
    var filas = allFechas.slice().reverse();

    if (!filas.length) {
      html += '<div style="color:var(--t3);font-size:11px;padding:6px 0">Sin partidos</div>';
    } else {
      filas.forEach(function (f) {
        var m = jugadasMap[f];
        if (m) {
          var dc = m.res === 'G' ? 'var(--rv)' : (m.res === 'E' ? 'var(--re)' : 'var(--rp)');
          html += '<div class="part-row">'
            + '<span class="part-f">F' + m.f + '</span>'
            + '<div class="part-dot" style="background:' + dc + '"></div>'
            + '<span class="part-cond">' + m.cond + '</span>'
            + '<span class="part-sc">' + m.gf + '–' + m.gc + '</span>'
            + '<span class="part-rv">' + m.rival + '</span>'
            + '</div>';
        } else {
          html += '<div class="part-row" style="opacity:.4">'
            + '<span class="part-f">F' + f + '</span>'
            + '<div class="part-dot" style="background:var(--s3)"></div>'
            + '<span style="font-size:10px;color:var(--t3);letter-spacing:.06em;font-family:var(--grotesk)">LIBRE</span>'
            + '</div>';
        }
      });
    }

    // ── GOLEADORES
    html += '<div class="panel-sec">GOLEADORES</div>';
    var goles = p.goleadores || [];
    if (!goles.length) {
      html += '<div style="color:var(--t3);font-size:11px;padding:6px 0">Sin goles registrados</div>';
    } else {
      goles.forEach(function (g) {
        var pen = g.penales > 0 ? ' <span class="gol-pen">(' + g.penales + 'p)</span>' : '';
        html += '<div class="gol-row">'
          + '<span class="gol-n">' + g.goles + '</span>'
          + '<span class="gol-name">' + g.jugador + pen + '</span>'
          + '</div>';
      });
    }

    return html;
  }

  // ── MOBILE DRAG TO CLOSE
  (function () {
    var handle = document.getElementById('panel-drag');
    var startY = 0, dragging = false;
    if (!handle) return;

    handle.addEventListener('touchstart', function (e) {
      startY   = e.touches[0].clientY;
      dragging = true;
    }, { passive: true });

    handle.addEventListener('touchmove', function (e) {
      if (!dragging) return;
      var dy = e.touches[0].clientY - startY;
      if (dy > 0) teamPanel.style.transform = 'translateY(' + dy + 'px)';
    }, { passive: true });

    handle.addEventListener('touchend', function (e) {
      if (!dragging) return;
      dragging = false;
      var dy = e.changedTouches[0].clientY - startY;
      teamPanel.style.transform = '';
      if (dy > 80) closePanel();
    }, { passive: true });
  })();

})();
</script>
</body>
</html>
